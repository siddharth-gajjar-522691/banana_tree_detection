# ─────────────────────────────────────────────────────────────────────────────
#  CD — Continuous Deployment
#  Runs on: push to main branch ONLY
#
#  PIPELINE:
#    push to main
#      → build Docker image
#      → push to GitHub Container Registry (GHCR)
#      → SSH into production server
#      → pull new image + restart with docker compose
#      → health-check the live endpoint
#
#  REQUIRED GITHUB SECRETS (repo → Settings → Secrets and variables → Actions):
#
#    DEPLOY_HOST         IP address of your production server
#    DEPLOY_USER         SSH username (ubuntu / root)
#    DEPLOY_SSH_KEY      Full contents of your private SSH key (.pem file)
#    DEPLOY_APP_DIR      Absolute path on server  e.g. /home/ubuntu/banana-app
#    DB_PASSWORD         MySQL banana user password
#    DB_ROOT_PASSWORD    MySQL root password
#    GHCR_TOKEN          GitHub Personal Access Token with read:packages scope
#                        → github.com → Settings → Developer settings
#                          → Personal access tokens → Tokens (classic)
#                          → Generate new token → tick "read:packages"
#                        WHY a separate token? GITHUB_TOKEN only lives during
#                        the workflow run. The server needs its own long-lived
#                        token to pull the image at deploy time.
# ─────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual deploy"

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  # ── Job 1: Build and push Docker image to GHCR ──────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/banana-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to production server ──────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Prepare the server directory and .env ───────────────────
      - name: Bootstrap server directory and write .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP=${{ secrets.DEPLOY_APP_DIR }}

            # Create app folder and all subdirs the app needs
            mkdir -p $APP/static/results/detected
            mkdir -p $APP/static/uploads
            mkdir -p $APP/Models

            # Write .env from GitHub secrets — never stored in git
            cat > $APP/.env <<'ENVEOF'
            DB_HOST=mysql
            DB_PORT=3306
            DB_USER=banana
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            DB_NAME=banana_db
            ENVEOF

            # Strip leading whitespace that YAML indentation adds
            sed -i 's/^[[:space:]]*//' $APP/.env
            chmod 600 $APP/.env

      # ── Step 2: Copy compose file and SQL init script ───────────────────
      - name: Copy docker-compose.yml and init.sql
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,init.sql"
          target: ${{ secrets.DEPLOY_APP_DIR }}

      # ── Step 3: Pull image and restart containers ────────────────────────
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP=${{ secrets.DEPLOY_APP_DIR }}
            IMAGE=ghcr.io/${{ github.repository_owner }}/banana-app:latest

            # Login to GHCR with the long-lived PAT stored as GHCR_TOKEN
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            cd $APP

            # Export the image name so docker-compose.yml picks it up
            export APP_IMAGE=$IMAGE

            # Pull the new image while the old containers are still running
            docker compose pull app

            # Swap containers — ~3s of actual downtime
            docker compose up -d --remove-orphans

            # Clean up old image layers to save disk space
            docker image prune -f

      # ── Step 4: Verify the app is healthy ───────────────────────────────
      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "Waiting for app to initialise (YOLO model load takes ~15s)..."
            sleep 20

            for i in 1 2 3 4 5; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
              echo "Attempt $i — HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Deployment successful!"
                exit 0
              fi
              sleep 10
            done

            echo "Health check failed after 5 attempts"
            cd ${{ secrets.DEPLOY_APP_DIR }} && docker compose logs app --tail=80
            exit 1

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## CD Result" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image  | \`ghcr.io/${{ github.repository_owner }}/banana-app:latest\` |" >> $GITHUB_STEP_SUMMARY
